<style>
.carousel__holder { width: 100%; position: relative; padding-bottom: {{ include.height }}{{ include.unit }}; margin: 1rem 0; }
.carousel { height: 100%; width: 100%; overflow: hidden; position: absolute; padding: 0; }
.carousel__controls, .carousel__activator { display: none; }

/* 1. The Track: Moves left/right based on which radio is checked */
{% for item in page.carousels[number].images %}
#carousel{{ number }} .carousel__activator:nth-of-type({{ forloop.index }}):checked ~ .carousel__track {
  transform: translateX(-{{ forloop.index0 }}00%);
}
/* 2. The Slide: Force opacity to 1 when its activator is checked */
#carousel{{ number }} .carousel__activator:nth-of-type({{ forloop.index }}):checked ~ .carousel__track .carousel__slide:nth-of-type({{ forloop.index }}) {
  opacity: 1;
  z-index: 1;
}
/* 3. The Controls & Indicators */
#carousel{{ number }} .carousel__activator:nth-of-type({{ forloop.index }}):checked ~ .carousel__controls:nth-of-type({{ forloop.index }}) {
  display: block;
}
#carousel{{ number }} .carousel__activator:nth-of-type({{ forloop.index }}):checked ~ .carousel__indicators .carousel__indicator:nth-of-type({{ forloop.index }}) {
  opacity: 1;
}
{% endfor %}

.carousel__track {
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  padding: 0; margin: 0;
  transition: transform 0.5s ease;
  display: flex; /* Keeps slides in a row */
}

.carousel__slide {
  height: 100%;
  min-width: 100%; /* Ensures each slide takes full width of the container */
  position: relative;
  opacity: 1; /* Keep them opaque within the track */
  background-size: cover;
  background-position: center;
  list-style: none;
}

/* Controls Styling */
.carousel__control {
  height: 30px; width: 30px; margin-top: -15px; top: 50%; position: absolute;
  cursor: pointer; border-width: 5px 5px 0 0; border-style: solid;
  border-color: #fafafa; z-index: 3;
}
.carousel__control--backward { left: 20px; transform: rotate(-135deg); }
.carousel__control--forward { right: 20px; transform: rotate(45deg); }

.carousel__indicators { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 2; }
.carousel__indicator { 
  height: 15px; width: 15px; border-radius: 100%; display: inline-block; 
  cursor: pointer; opacity: 0.35; margin: 0 5px; background-color: #fafafa; 
}
</style>
